[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# 單頁應用:所有路徑回退到 index.html(避免重新整理 404)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 提醒:VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY 請於
# Netlify Site settings → Environment variables 設定(勿寫在此檔)。
