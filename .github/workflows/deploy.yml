name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Full QA gate
        run: npm run qa:gate
        env:
          BUTTON_AUDIT_BROWSER_PATH: /usr/bin/google-chrome

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
